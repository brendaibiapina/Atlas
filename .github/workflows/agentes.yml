name: Agentes Atlas Reforma Tributária

on:
  schedule:
    # Rodar RFB Entenda Agent todo sábado às 03:00 UTC (Meia noite no Brasil)
    - cron: '0 3 * * 6'
    
    # Rodar RFB News Agent e Obrigações todos os dias úteis às 11:00 UTC (08:00 Brasil)
    - cron: '0 11 * * 1-5'
    
  workflow_dispatch: # Permite execução manual pelo botão no painel Actions
    inputs:
      mode:
        description: Modo de execução manual
        required: false
        default: daily
        type: choice
        options:
          - daily
          - entenda
          - all

permissions:
  contents: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # cache pip dependencies
        
    - name: Install dependencies
      working-directory: ./05-Agentes
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run RFB Entenda Agent
      if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * 6'
      working-directory: ./05-Agentes
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python run_ci.py --mode entenda

    - name: Run Daily Agents
      if: github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1-5'
      working-directory: ./05-Agentes
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python run_ci.py --mode daily

    - name: Run Manual Dispatch
      if: github.event_name == 'workflow_dispatch'
      working-directory: ./05-Agentes
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python run_ci.py --mode ${{ github.event.inputs.mode || 'daily' }}

    - name: Commit and push state changes
      if: always()
      working-directory: ./05-Agentes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add $(find logs -type f -name '*.json') 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "No state changes to commit"
          exit 0
        fi
        git commit -m "chore: save agents state [skip ci]"
        git push
