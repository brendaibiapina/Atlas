name: Agentes Atlas Reforma Tributária

on:
  schedule:
    # Rodar RFB Entenda Agent todo sábado às 03:00 UTC (Meia noite no Brasil)
    - cron: '0 3 * * 6'
    
    # Rodar RFB News Agent e Obrigações todos os dias úteis às 11:00 UTC (08:00 Brasil)
    - cron: '0 11 * * 1-5'
    
  workflow_dispatch: # Permite execução manual pelo botão no painel Actions

jobs:
  run-agents:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # cache pip dependencies
        
    - name: Install dependencies
      working-directory: ./05-Agentes
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run RFB Entenda Agent
      if: github.event.schedule == '0 3 * * 6' || github.event_name == 'workflow_dispatch'
      working-directory: ./05-Agentes
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python run.py rfb_entenda

    - name: Run Daily Agents
      if: github.event.schedule == '0 11 * * 1-5' || github.event_name == 'workflow_dispatch'
      working-directory: ./05-Agentes
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        python run.py rfb_news
        # O agente de obrigações deverá ser chamado aqui também

    - name: Commit and push state changes
      if: always()
      working-directory: ./05-Agentes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add logs/*.json
        git commit -m "chore: save agents state [skip ci]" || echo "No state changes to commit"
        git push || echo "Nothing to push"
